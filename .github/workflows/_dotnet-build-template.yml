name: '[Reusable] Build'

on:
  workflow_call:
    inputs:
      configuration:
        type: string
      solution:
        type: string
      filename:
        type: string

jobs:
  reusable_workflow_job:
    runs-on:  windows-latest
    env:
      Solution_Name: Holos.sln
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0        

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore nuget packages
      run: msbuild ${{ inputs.solution }} /t:Restore /m
      env:
        Configuration: ${{ inputs.configuration }}

    - name: Build solution
      run: msbuild ${{ inputs.solution }} /p:platform="Any CPU" /p:Configuration=$env:Configuration /m
      env:
        Configuration: ${{ inputs.configuration }}

    - name: Run Tests
      run: dotnet test ${{ inputs.solution }} --configuration ${{ inputs.configuration }} --no-build --no-restore

    - name: Upload build artifacts
      if: ${{ inputs.configuration == 'Release' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.filename }}
        path: '**/H.Core/bin/*'